<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weatherball</title>
  <meta name="description" content="Weatherball — game schedules and weather for your favorite teams." />
  <style>
    :root {
      --bg: #0b1620;
      --fg: #f5f7fa;
      --muted: #9fb0c0;
      --accent: #4ea1ff;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    .wrap {
      max-width: 720px;
      margin: 0 auto;
      padding: 12vh 24px 64px;
    }
    h1 { font-size: 2.5rem; margin: 0 0 0.25em; letter-spacing: -0.02em; }
    .tagline { color: var(--muted); font-size: 1.25rem; margin: 0 0 2.5em; }
    h2 { font-size: 1.1rem; margin: 2.5em 0 0.5em; }
    a { color: var(--accent); }
    footer {
      margin-top: 4em;
      padding-top: 1.5em;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
      font-size: 0.9rem;
    }
    nav a { margin-right: 1.5em; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Weatherball</h1>
    <p class="tagline">Game schedules and weather for your favorite teams.</p>

    <nav>
      <a href="/privacy.html">Privacy</a>
      <a href="/terms.html">Terms</a>
      <a href="/support.html">Support</a>
    </nav>

    <h2>About</h2>
    <p>Weatherball brings your team's schedule together with the forecast, so you always know what to expect on game day.</p>

    <footer>
      &copy; 2026 44 Points. All rights reserved.
    </footer>
  </main>
</body>
</html>
